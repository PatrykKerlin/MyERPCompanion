services:

  postgres:
    build:
      context: ./rest-api
      dockerfile: dockerfile-db
    networks:
      - project_net
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    environment:
      - POSTGRES_DB=MyERPCompanion
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=changeme

  ai-app:
    build:
      context: ./ai-app
      dockerfile: dockerfile-ai
    networks:
      - project_net
    volumes:
      - ./ai-app/ai_app/:/ai_app
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:changeme@postgres/MyERPCompanion
    depends_on:
      - postgres
    command:
      sh -c "python -m main"

  rest-api:
    build:
      context: ./rest-api
      dockerfile: dockerfile-api
    networks:
      - project_net
    ports:
      - "8000:8000"
    volumes:
      - ./rest-api/rest_api/:/rest_api
      - media-data:/media
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:changeme@postgres/MyERPCompanion
      - SECRET_KEY=secret
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - MODULE_HEADER=X-View-Module
      - MEDIA_DIR=/media
      - MEDIA_URL=http://rest-api:8000/media
      - CORS_ORIGINS=http://localhost:8550,http://127.0.0.1:8550,http://localhost:8551,http://127.0.0.1:8551
      - SUPERUSER_USERNAME=admin
      - SUPERUSER_PASSWORD=admin123
    depends_on:
      - postgres
    command:
      sh -lc "mkdir -p /media/images &&
      exec /project/bin/uvicorn main:start_app --host 0.0.0.0 --port 8000 --lifespan=on --workers 4"

  multi-app:
    build:
      context: ./multi-app
      dockerfile: dockerfile-multi
    networks:
      - project_net
    volumes:
      - ./multi-app/multi_app/:/multi_app
      - /mnt/wslg/runtime-dir:/mnt/wslg/runtime-dir
    environment:
      - API_URL=http://rest-api:8000/api
      - PUBLIC_API_URL=http://localhost:8000/api
      - WAYLAND_DISPLAY=wayland-0
      - XDG_RUNTIME_DIR=/mnt/wslg/runtime-dir
      - XDG_SESSION_TYPE=wayland
      - GDK_BACKEND=wayland
    depends_on:
      - rest-api
    command:
      sh -c "flet run main_desktop.py"

  mobile-app:
    build:
      context: ./mobile-app
      dockerfile: dockerfile-mobile
    networks:
      - project_net
    volumes:
      - ./mobile-app/mobile_app/:/mobile_app
    environment:
      - API_URL=http://rest-api:8000/api
      - PUBLIC_API_URL=http://localhost:8000/api
      - FLET_SERVER_HOST=0.0.0.0
      - FLET_SERVER_PORT=8551
    depends_on:
      - rest-api
    command:
      sh -c "/project/bin/python /mobile_app/main_mobile.py"
    ports:
      - "8551:8551"

  web-app:
    build:
      context: ./web-app
      dockerfile: dockerfile-web
    networks:
      - project_net
    volumes:
      - ./web-app/web_app/:/web_app
    environment:
      - API_URL=http://rest-api:8000/api
      - PUBLIC_API_URL=http://localhost:8000/api
      - FLET_SERVER_HOST=0.0.0.0
      - FLET_SERVER_PORT=8550
    depends_on:
      - rest-api
    command:
      sh -c "/project/bin/python /web_app/main.py"
    ports:
      - "8550:8550"

volumes:
  postgres-data:
  media-data:

networks:
  project_net:
    driver: bridge
