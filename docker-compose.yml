services:

  postgres:
    build:
      context: ./rest-api
      dockerfile: dockerfile-db
    networks:
      - project_net
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    environment:
      - POSTGRES_DB=MyERPCompanion
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=changeme

  rest-api:
    build:
      context: ./rest-api
      dockerfile: dockerfile-api
    networks:
      - project_net
    ports:
      - "8000:8000"
    volumes:
      - ./rest-api/rest_api/:/rest_api
      - media-data:/media
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:changeme@postgres/MyERPCompanion
      - SECRET_KEY=secret
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - MODULE_HEADER=X-View-Module
      - MEDIA_DIR=/media
      - MEDIA_URL=http://rest-api:8000/media
      - CORS_ORIGINS=http://localhost:8550,http://127.0.0.1:8550,http://localhost:8551,http://127.0.0.1:8551,http://localhost:8552,http://127.0.0.1:8552
      - SUPERUSER_USERNAME=admin
      - SUPERUSER_PASSWORD=haslo123
      - ISSUER_NAME=Northwind Distribution Sp. z o.o.
      - ISSUER_TAX_ID=PL5273012345
      - ISSUER_STREET=Prosta
      - ISSUER_HOUSE_NUMBER=51
      - ISSUER_APARTMENT_NUMBER=7
      - ISSUER_POSTAL_CODE=00-838
      - ISSUER_CITY=Warsaw
      - ISSUER_COUNTRY=Poland
      - ISSUER_EMAIL=billing@northwind-distribution.com
      - ISSUER_PHONE=+48221234567
      - ISSUER_BANK_NAME=PKO BP
      - ISSUER_BANK_ACCOUNT=PL61109010140000071219812874
    depends_on:
      - postgres
    command:
      sh -lc "mkdir -p /media/images &&
      exec /project/bin/uvicorn main:start_app --host 0.0.0.0 --port 8000 --lifespan=on --workers 4"

  ai-app:
    build:
      context: ./ai-app
      dockerfile: dockerfile
    networks:
      - project_net
    volumes:
      - ./ai-app/ai_app/:/ai_app
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:changeme@postgres/MyERPCompanion
    depends_on:
      - postgres
    command:
      sh -c "python -m main"

  desktop-app:
    build:
      context: ./desktop-app
      dockerfile: dockerfile
    networks:
      - project_net
    volumes:
      - ./desktop-app/desktop_app/:/desktop_app
      - /mnt/wslg/runtime-dir:/mnt/wslg/runtime-dir
    environment:
      - API_URL=http://rest-api:8000/api
      - PUBLIC_API_URL=http://localhost:8000/api
      - WAYLAND_DISPLAY=wayland-0
      - XDG_RUNTIME_DIR=/mnt/wslg/runtime-dir
      - XDG_SESSION_TYPE=wayland
      - GDK_BACKEND=wayland
    depends_on:
      - rest-api
    command:
      sh -c "dbus-run-session -- flet run main.py"

  desktop-app-web:
    build:
      context: ./desktop-app
      dockerfile: dockerfile
    user: root
    networks:
      - project_net
    volumes:
      - ./desktop-app/desktop_app/:/desktop_app
      - desktop-app-web-upload-data:/tmp/flet-uploads
    environment:
      - API_URL=http://rest-api:8000/api
      - PUBLIC_API_URL=http://localhost:8000/api
      - FLET_SERVER_HOST=0.0.0.0
      - FLET_SERVER_PORT=8552
      - FLET_UPLOAD_DIR=/tmp/flet-uploads
      - FLET_SECRET_KEY=desktop-app-web-dev-secret
    depends_on:
      - rest-api
    command:
      sh -c "/project/bin/python /desktop_app/main_win.py"
    ports:
      - "8552:8552"

  mobile-app:
    build:
      context: ./mobile-app
      dockerfile: dockerfile
    networks:
      - project_net
    volumes:
      - ./mobile-app/mobile_app/:/mobile_app
    environment:
      - API_URL=http://rest-api:8000/api
      - PUBLIC_API_URL=http://localhost:8000/api
      - FLET_SERVER_HOST=0.0.0.0
      - FLET_SERVER_PORT=8551
    depends_on:
      - rest-api
    command:
      sh -c "/project/bin/python /mobile_app/main.py"
    ports:
      - "8551:8551"

  web-app:
    build:
      context: ./web-app
      dockerfile: dockerfile
    networks:
      - project_net
    volumes:
      - ./web-app/web_app/:/web_app
    environment:
      - API_URL=http://rest-api:8000/api
      - PUBLIC_API_URL=http://localhost:8000/api
      - FLET_SERVER_HOST=0.0.0.0
      - FLET_SERVER_PORT=8550
    depends_on:
      - rest-api
    command:
      sh -c "/project/bin/python /web_app/main.py"
    ports:
      - "8550:8550"

volumes:
  postgres-data:
  media-data:
  desktop-app-web-upload-data:

networks:
  project_net:
    driver: bridge
