services:

  postgres:
    build:
      context: ./rest-api
      dockerfile: dockerfile-db
    networks:
      - project_net
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    environment:
      - POSTGRES_DB=MyERPCompanion
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=changeme

  ai-app:
    build:
      context: ./ai-app
      dockerfile: dockerfile-ai
    networks:
      - project_net
    volumes:
      - ./ai-app:/ai_app
      - ./shared/models:/ai_app/models
      - ./shared/database:/ai_app/database
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:changeme@postgres/MyERPCompanion
    depends_on:
      - postgres
    command:
      sh -c "python -m ai_app.main"

  rest-api:
    build:
      context: ./rest-api
      dockerfile: dockerfile-api
    networks:
      - project_net
    ports:
      - "8000:8000"
    volumes:
      - ./rest-api/rest_api/:/rest_api
      - ./shared/models:/rest_api/models
      - ./shared/database:/rest_api/database
      - ./shared/schemas/business:/rest_api/schemas/business
      - ./shared/schemas/core:/rest_api/schemas/core
      - ./shared/schemas/validation:/rest_api/schemas/validation
      - ./rest-api/rest_api/schemas/base:/rest_api/schemas/base
      - media-data:/media
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:changeme@postgres/MyERPCompanion
      - SECRET_KEY=secret
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - MODULE_HEADER=X-View-Module
      - MEDIA_DIR=/media
      - MEDIA_URL=http://rest-api:8000/media
      - CORS_ORIGINS=http://localhost:8550,http://127.0.0.1:8550
      - SUPERUSER_USERNAME=admin
      - SUPERUSER_PASSWORD=admin123
    depends_on:
      - postgres
    command:
      sh -lc "mkdir -p /media/images &&
      exec /project/bin/uvicorn main:start_app --host 0.0.0.0 --port 8000 --lifespan=on --workers 4"

  multi-app:
    build:
      context: ./multi-app
      dockerfile: dockerfile-multi
    networks:
      - project_net
    volumes:
      - ./multi-app/multi_app/:/multi_app
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./shared/schemas/business:/multi_app/schemas/business
      - ./shared/schemas/core:/multi_app/schemas/core
      - ./shared/schemas/validation:/multi_app/schemas/validation
      - ./multi-app/multi_app/schemas/base:/multi_app/schemas/base
    environment:
      - DISPLAY=${DISPLAY}
      - API_URL=http://rest-api:8000/api
      - PUBLIC_API_URL=http://localhost:8000/api
    command:
      sh -c "flet run main_desktop.py & FLET_FORCE_WEB_SERVER=true FLET_SERVER_PORT=8550 FLET_SERVER_IP=0.0.0.0 /project/bin/python /multi_app/main_web.py"
    ports:
      - "8550:8550"

volumes:
  postgres-data:
  media-data:

networks:
  project_net:
    driver: bridge
